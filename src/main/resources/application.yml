spring:
  application:
    name: DishPatch

  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/dishpatch?rewriteBatchedStatements=true}
    username: ${MYSQL_USERNAME:testuser}
    password: ${MYSQL_PASSWORD:testpass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc.batch_size: 100
        order_inserts: true
        order_updates: true
    open-in-view: false

  batch.job.enabled: false

  security:
    oauth2:
      client:
        registration:
          naver:
            client-id: ${SOCIAL_LOGINID}
            client-secret: ${SOCIAL_LOGINPASS}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "http://localhost:8080/login/oauth2/code/naver"
            scope:
              - name
              - email
              - mobile
            client-name: Naver

        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-info-authentication-method: header
            user-name-attribute: response # Naver 응답 값 resultCode, message, response 중 response 지정

jwt:
  secret: ${JWT_SECRET:default-secret}

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    s3:
      bucket: ${AWS_S3_BUCKET}
    region:
      static: ap-southeast-2 # 서울 리전 (다른 리전이면 수정)
    stack:
      auto: false